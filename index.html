        // Convert kebab-case to PascalCase (e.g. "map-pin" → "MapPin")
        function toPascal(str) {
            return str.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
        }

        function Icon({ name, size = 20, className = "" }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = "";
                    // Lucide CDN uses PascalCase keys (e.g. "MapPin", "BarChart3")
                    const pascal = toPascal(name);
                    const icon = (lucide.icons && (lucide.icons[pascal] || lucide.icons[name])) || null;
                    if (!icon) return;

                    if (typeof icon.toSvg === "function") {
                        // Old Lucide API
                        ref.current.innerHTML = icon.toSvg({ width: size, height: size, class: className });
                    } else if (typeof lucide.createElement === "function") {
                        // New Lucide API — icon is [tag, attrs, children]
                        const el = lucide.createElement(icon);
                        el.setAttribute("width", String(size));
                        el.setAttribute("height", String(size));
                        if (className) el.setAttribute("class", className);
                        ref.current.appendChild(el);
                    }
                }
            }, [name, size, className]);
            return React.createElement("span", { ref, className: "inline-flex items-center justify-center" });
        }

            useEffect(() => {

                    ([entry]) => { if (entry.isIntersecting) setInView(true); },
                    { threshold }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return [ref, inView];
        }

                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a key={link.href} href={link.href} className="nav-link text-sm text-slate-400 hover:text-cyan-400 transition-colors duration-300">
                                    {link.label}
                                </a>
                            ))}
                        </div>

                        {/* Lang + Mobile Button */}
                        <div className="flex items-center gap-3">
                            <button
                                onClick={toggleLang}
                                className="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-700 hover:border-cyan-500/50 text-xs font-mono font-medium text-slate-300 hover:text-cyan-400 transition-all duration-300 hover:bg-cyan-500/5"
                                aria-label="Toggle language"
                            >
                                <Icon name="languages" size={14} />
                                <span>{lang === "fr" ? "EN" : "FR"}</span>
                            </button>
                            <button
                                onClick={() => setMenuOpen(!menuOpen)}
                                className="md:hidden text-slate-300 hover:text-cyan-400 transition-colors"
                                aria-label="Menu"
                            >
                                <Icon name={menuOpen ? "x" : "menu"} size={22} />
                            </button>
                        </div>
                    </div>

                    {/* Mobile Menu */}
                    {menuOpen && (
                        <div className="md:hidden glass border-t border-slate-800/50 animate-fade-in">
                            <div className="px-6 py-4 flex flex-col gap-3">
                                {navLinks.map((link) => (
                                    <a
                                        key={link.href}
                                        href={link.href}
                                        onClick={() => setMenuOpen(false)}
                                        className="text-sm text-slate-400 hover:text-cyan-400 transition-colors py-1"
                                    >
                                        {link.label}
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );

            // ── HERO ──
            const Hero = () => (
                <section className="relative min-h-screen flex items-center justify-center hero-grid-bg overflow-hidden">
                    {/* Decorative orbs */}
                    <div className="absolute top-1/4 -left-32 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl animate-float" />
                    <div className="absolute bottom-1/4 -right-32 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-float" style={{ animationDelay: "3s" }} />

                    <div className="relative max-w-6xl mx-auto px-6 text-center">
                        {/* Status tag */}
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-slate-800 bg-slate-900/60 text-xs text-slate-400 mb-8 animate-fade-in" style={{ animationDelay: "0.2s" }}>
                            <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
                            {t.hero.status}
                        </div>

                        {/* Greeting */}
                        <p className="text-slate-400 text-lg mb-3 font-light tracking-wide animate-fade-in" style={{ animationDelay: "0.4s" }}>
                            {t.hero.greeting}
                        </p>

                        {/* Name */}
                        <h1 className="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-extrabold tracking-tight mb-6 animate-fade-in-up" style={{ animationDelay: "0.5s" }}>
                            <span className="gradient-text">{t.hero.name}</span>
                        </h1>

                        {/* Title */}
                        <h2 className="text-xl sm:text-2xl md:text-3xl font-semibold text-slate-200 mb-6 animate-fade-in-up" style={{ animationDelay: "0.7s" }}>
                            {t.hero.title}
                        </h2>

                        {/* Subtitle */}
                        <p className="max-w-2xl mx-auto text-slate-400 text-base sm:text-lg leading-relaxed mb-8 animate-fade-in-up" style={{ animationDelay: "0.9s" }}>
                            {t.hero.subtitle}
                        </p>

                        {/* Location */}
                        <div className="flex items-center justify-center gap-2 text-sm text-slate-500 mb-10 animate-fade-in" style={{ animationDelay: "1s" }}>
                            <Icon name="map-pin" size={14} />
                            <span>{t.hero.location}</span>
                        </div>

                        {/* CTA Buttons */}
                        <div className="flex flex-col sm:flex-row gap-4 justify-center animate-fade-in-up" style={{ animationDelay: "1.1s" }}>
                            <a
                                href="#contact"
                                className="inline-flex items-center justify-center gap-2 px-8 py-3.5 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-slate-950 font-semibold text-sm hover:from-cyan-400 hover:to-blue-400 transition-all duration-300 hover:shadow-lg hover:shadow-cyan-500/25 hover:scale-[1.02]"
                            >
                                <Icon name="send" size={16} />
                                {t.hero.contact}
                            </a>
                            <a
                                href="#"
                                className="inline-flex items-center justify-center gap-2 px-8 py-3.5 rounded-xl border border-slate-700 text-slate-300 font-semibold text-sm hover:border-cyan-500/50 hover:text-cyan-400 hover:bg-cyan-500/5 transition-all duration-300"
                            >
                                <Icon name="download" size={16} />
                                {t.hero.cv}
                            </a>
                        </div>
                    </div>

                    {/* Scroll indicator */}
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 animate-fade-in" style={{ animationDelay: "1.5s" }}>
                        <div className="w-5 h-8 rounded-full border-2 border-slate-700 flex items-start justify-center p-1">
                            <div className="w-1 h-2 rounded-full bg-cyan-400 animate-bounce" />
                        </div>
                    </div>
                </section>
            );

            // ── ABOUT ──
            const About = () => (
                <Section id="about" className="py-24 sm:py-32 bg-slate-950">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <span className="text-cyan-400 font-mono text-sm tracking-wider uppercase">{t.about.sectionTitle}</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-slate-100 mt-2">{t.about.sectionSubtitle}</h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 mx-auto mt-4 rounded-full" />
                        </div>

                        <div className="grid lg:grid-cols-2 gap-12 items-start">
                            {/* Text */}
                            <div>
                                <p className="text-slate-300 leading-relaxed text-base sm:text-lg mb-6">
                                    {t.about.text}
                                </p>
                                <div className="flex flex-wrap gap-3 mb-6">
                                    {t.about.cycle.map((item, i) => (
                                        <span
                                            key={i}
                                            className="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-900 border border-slate-800 text-sm text-cyan-400 font-medium"
                                        >
                                            <Icon name={i === 0 ? "cog" : i === 1 ? "search" : "monitor"} size={15} />
                                            {item}
                                        </span>
                                    ))}
                                </div>
                            </div>

                            {/* Code card */}
                            <div className="code-block rounded-xl p-1 pulse-glow">
                                <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-800/60">
                                    <div className="flex gap-1.5">
                                        <span className="w-3 h-3 rounded-full bg-red-500/80" />
                                        <span className="w-3 h-3 rounded-full bg-yellow-500/80" />
                                        <span className="w-3 h-3 rounded-full bg-green-500/80" />
                                    </div>
                                    <span className="text-slate-500 text-xs font-mono ml-2">{t.about.codeComment}</span>
                                </div>
                                <pre className="p-5 text-sm leading-relaxed overflow-x-auto">
                                    <code className="font-mono">
                                        <span className="text-blue-400">const </span>
                                        <span className="text-cyan-300">nathanAvenel</span>
                                        <span className="text-slate-400"> = {"{"}</span>
                                        {"\n"}
                                        {t.about.codeContent.split("\n").slice(1, -1).map((line, i) => {
                                            const parts = line.trim();
                                            if (!parts) return null;
                                            const colonIdx = parts.indexOf(":");
                                            if (colonIdx === -1) return <span key={i}>  {parts}{"\n"}</span>;
                                            const key = parts.substring(0, colonIdx);
                                            const val = parts.substring(colonIdx + 1);
                                            return (
                                                <span key={i}>
                                                    {"  "}<span className="text-emerald-400">{key}</span>
                                                    <span className="text-slate-500">:</span>
                                                    <span className="text-amber-300">{val}</span>
                                                    {"\n"}
                                                </span>
                                            );
                                        })}
                                        <span className="text-slate-400">{"}"};</span>
                                    </code>
                                </pre>
                            </div>
                        </div>
                    </div>
                </Section>
            );

            // ── SKILLS ──
            const Skills = () => (
                <Section id="skills" className="py-24 sm:py-32 bg-slate-900/40">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <span className="text-cyan-400 font-mono text-sm tracking-wider uppercase">{t.skills.sectionTitle}</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-slate-100 mt-2">{t.skills.sectionSubtitle}</h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 mx-auto mt-4 rounded-full" />
                        </div>

                        <div className="grid sm:grid-cols-2 gap-6">
                            {t.skills.categories.map((cat, idx) => (
                                <div
                                    key={idx}
                                    className="card-hover group rounded-2xl border border-slate-800 bg-slate-900/60 p-6 sm:p-8"
                                >
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-10 h-10 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors duration-300">
                                            <Icon name={cat.icon} size={20} />
                                        </div>
                                        <h3 className="text-lg font-semibold text-slate-100">{cat.title}</h3>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {cat.items.map((item, i) => (
                                            <span
                                                key={i}
                                                className="badge-tech px-3 py-1.5 rounded-lg bg-slate-800/80 border border-slate-700/50 text-xs text-slate-300 font-medium"
                                            >
                                                {item}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </Section>
            );

            const Projects = () => (
                <Section id="projects" className="py-24 sm:py-32 bg-slate-950">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <span className="text-cyan-400 font-mono text-sm tracking-wider uppercase">{t.projects.sectionTitle}</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-slate-100 mt-2">{t.projects.sectionSubtitle}</h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 mx-auto mt-4 rounded-full" />
                        </div>

                        {/* Featured Project */}
                        <div className="mb-16 rounded-2xl border border-slate-800 bg-gradient-to-br from-slate-900 via-slate-900/95 to-cyan-950/20 overflow-hidden card-hover">
                            <div className="grid lg:grid-cols-5 gap-0">
                                {/* Text */}
                                <div className="lg:col-span-3 p-8 sm:p-10 flex flex-col justify-center">
                                    <span className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 font-mono text-xs w-fit mb-4">
                                        <Icon name="star" size={12} />
                                        {t.projects.featured.label}
                                    </span>
                                    <h3 className="text-2xl sm:text-3xl font-bold text-slate-100 mb-4">{t.projects.featured.title}</h3>
                                    <p className="text-slate-400 leading-relaxed mb-6">{t.projects.featured.description}</p>
                                    <div className="flex flex-wrap gap-2">
                                        {t.projects.featured.tags.map((tag, i) => (
                                            <span key={i} className="px-3 py-1.5 rounded-lg bg-cyan-500/10 border border-cyan-500/20 text-xs font-medium text-cyan-400">
                                                {tag}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* Image placeholder grid */}
                                <div className="lg:col-span-2 p-6 sm:p-8 flex flex-col gap-4">
                                    <div className="flex-1 rounded-xl bg-slate-800/50 border border-slate-700/50 overflow-hidden group min-h-[140px] cursor-pointer" onClick={() => setLightboxImg("webgis_map_view.png")}>
                                        <img src="webgis_map_view.png" alt="WebGIS Map View — Vue cartographique des affaires NCA" className="w-full h-full object-cover rounded-xl transition-transform duration-500 group-hover:scale-105" />
                                    </div>
                                    <div className="flex-1 rounded-xl bg-slate-800/50 border border-slate-700/50 overflow-hidden group min-h-[140px] cursor-pointer" onClick={() => setLightboxImg("webgis_layers.png")}>
                                        <img src="webgis_layers.png" alt="WebGIS Layers — Couches géographiques (bassins versants, limites communales)" className="w-full h-full object-cover rounded-xl transition-transform duration-500 group-hover:scale-105" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Other Projects Grid */}
                        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {t.projects.others.map((project, idx) => (
                                <div
                                    key={idx}
                                    className="card-hover group rounded-2xl border border-slate-800 bg-slate-900/60 p-6"
                                >
                                    <div className="flex items-start justify-between mb-4">
                                        <div className="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/10 group-hover:border-cyan-500/30 transition-all duration-300">
                                            <Icon name="folder" size={18} />
                                        </div>
                                        <Icon name="arrow-up-right" size={16} className="text-slate-600 group-hover:text-cyan-400 transition-colors" />
                                    </div>
                                    <h4 className="text-base font-semibold text-slate-100 mb-2 group-hover:text-cyan-400 transition-colors duration-300">{project.title}</h4>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-4">{project.description}</p>
                                    <div className="flex flex-wrap gap-1.5">
                                        {project.tags.map((tag, i) => (
                                            <span key={i} className="px-2 py-1 rounded-md bg-slate-800/80 border border-slate-700/50 text-[11px] text-slate-500 font-mono">
                                                {tag}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </Section>
            );

            // ── TIMELINE ──
            const Timeline = () => (
                <Section id="timeline" className="py-24 sm:py-32 bg-slate-900/40">
                    <div className="max-w-4xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <span className="text-cyan-400 font-mono text-sm tracking-wider uppercase">{t.timeline.sectionTitle}</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-slate-100 mt-2">{t.timeline.sectionSubtitle}</h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 mx-auto mt-4 rounded-full" />
                        </div>

                        <div className="relative">
                            {/* Vertical line */}
                            <div className="absolute left-4 sm:left-1/2 sm:-translate-x-px top-0 bottom-0 w-0.5 timeline-line" />

                            <div className="space-y-12">
                                {t.timeline.items.map((item, idx) => {
                                    const isLeft = idx % 2 === 0;
                                    return (
                                        <div key={idx} className={`relative flex items-start gap-6 sm:gap-0 ${isLeft ? "sm:flex-row" : "sm:flex-row-reverse"}`}>
                                            {/* Dot */}
                                            <div className="absolute left-4 sm:left-1/2 sm:-translate-x-1/2 w-3 h-3 rounded-full bg-cyan-400 border-4 border-slate-950 z-10 mt-1.5" />

                                            {/* Content */}
                                            <div className={`ml-12 sm:ml-0 sm:w-1/2 ${isLeft ? "sm:pr-12 sm:text-right" : "sm:pl-12"}`}>
                                                <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-mono mb-2 ${item.type === "work" ? "bg-cyan-500/10 text-cyan-400 border border-cyan-500/20" : "bg-blue-500/10 text-blue-400 border border-blue-500/20"}`}>
                                                    <Icon name={item.type === "work" ? "briefcase" : "graduation-cap"} size={12} />
                                                    {item.date}
                                                </div>
                                                <h3 className="text-lg font-semibold text-slate-100">{item.title}</h3>
                                                <p className="text-cyan-400 text-sm font-medium mb-1">{item.place}</p>
                                                <p className="text-slate-400 text-sm leading-relaxed">{item.description}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </Section>
            );

            // ── FOOTER / CONTACT ──
            const Footer = () => (
                <Section id="contact" className="py-24 sm:py-32 bg-slate-950 border-t border-slate-800/50">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <span className="text-cyan-400 font-mono text-sm tracking-wider uppercase">{t.footer.sectionTitle}</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-slate-100 mt-2">{t.footer.sectionSubtitle}</h2>
                            <div className="w-16 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 mx-auto mt-4 rounded-full" />
                        </div>

                        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
                            {/* Email */}
                            <a href={`mailto:${t.footer.email}`} className="card-hover flex items-center gap-4 p-5 rounded-2xl border border-slate-800 bg-slate-900/60 group">
                                <div className="w-11 h-11 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors">
                                    <Icon name="mail" size={20} />
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs">Email</p>
                                    <p className="text-slate-200 text-sm font-medium">{t.footer.email}</p>
                                </div>
                            </a>
                            {/* Phone */}
                            <a href={`tel:${t.footer.phone}`} className="card-hover flex items-center gap-4 p-5 rounded-2xl border border-slate-800 bg-slate-900/60 group">
                                <div className="w-11 h-11 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors">
                                    <Icon name="phone" size={20} />
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs">{lang === "fr" ? "Téléphone" : "Phone"}</p>
                                    <p className="text-slate-200 text-sm font-medium">{t.footer.phone}</p>
                                </div>
                            </a>
                            {/* Location */}
                            <div className="card-hover flex items-center gap-4 p-5 rounded-2xl border border-slate-800 bg-slate-900/60 group">
                                <div className="w-11 h-11 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors">
                                    <Icon name="map-pin" size={20} />
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs">{lang === "fr" ? "Localisation" : "Location"}</p>
                                    <p className="text-slate-200 text-sm font-medium">{t.footer.location}</p>
                                </div>
                            </div>
                            {/* License */}
                            <div className="card-hover flex items-center gap-4 p-5 rounded-2xl border border-slate-800 bg-slate-900/60 group">
                                <div className="w-11 h-11 rounded-xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-cyan-400 group-hover:bg-cyan-500/20 transition-colors">
                                    <Icon name="car" size={20} />
                                </div>
                                <div>
                                    <p className="text-slate-500 text-xs">{lang === "fr" ? "Véhicule" : "Vehicle"}</p>
                                    <p className="text-slate-200 text-sm font-medium">{t.footer.license}</p>
                                </div>
                            </div>
                        </div>

                        {/* Links & Interests */}
                        <div className="grid sm:grid-cols-2 gap-8 mb-16">
                            {/* Social Links */}
                            <div className="flex flex-col gap-4">
                                <h4 className="text-sm font-semibold text-slate-300 uppercase tracking-wider">Liens</h4>
                                <div className="flex flex-wrap gap-3">
                                    <a href="https://github.com/Nakann" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-800 bg-slate-900/60 text-sm text-slate-300 hover:text-cyan-400 hover:border-cyan-500/30 transition-all duration-300 group">
                                        <Icon name="github" size={16} />
                                        GitHub
                                    </a>
                                    <a href="#" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-800 bg-slate-900/60 text-sm text-slate-300 hover:text-cyan-400 hover:border-cyan-500/30 transition-all duration-300 group">
                                        <Icon name="linkedin" size={16} />
                                        LinkedIn
                                    </a>
                                    <a href="https://nakann.github.io/" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-800 bg-slate-900/60 text-sm text-slate-300 hover:text-cyan-400 hover:border-cyan-500/30 transition-all duration-300 group">
                                        <Icon name="globe" size={16} />
                                        {lang === "fr" ? "Site Web" : "Website"}
                                    </a>
                                </div>
                            </div>

                            {/* Interests */}
                            <div className="flex flex-col gap-4">
                                <h4 className="text-sm font-semibold text-slate-300 uppercase tracking-wider">{t.footer.interests}</h4>
                                <div className="flex flex-wrap gap-3">
                                    {t.footer.interestsList.map((interest, i) => {
                                        const icons = ["camera", "monitor", "pen-tool", "gamepad-2"];
                                        return (
                                            <span key={i} className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-800 bg-slate-900/60 text-sm text-slate-400">
                                                <Icon name={icons[i]} size={15} className="text-cyan-500/60" />
                                                {interest}
                                            </span>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Bottom bar */}
                        <div className="border-t border-slate-800/50 pt-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-slate-500">
                            <div className="flex items-center gap-2">
                                <div className="w-6 h-6 rounded-md bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center text-[10px] font-bold text-slate-950">NA</div>
                                <span>© 2025 Nathan AVENEL. {t.footer.rights}</span>
                            </div>
                            <div className="flex items-center gap-1.5 font-mono text-xs text-slate-400">
                                <Icon name="sparkles" size={12} />
                                <span>{lang === "fr" ? "Conçu avec" : "Built with"} Claude Opus 4.6</span>
                            </div>
                        </div>
                    </div>
                </Section>
            );

            // ── RENDER ──
            return (
                <div className="bg-slate-950 min-h-screen">
                    <Navbar />
                    <Hero />
                    <About />
                    <Skills />
                    <Projects />
                    <Timeline />
                    <Footer />

                    {/* Lightbox Modal */}
                    {lightboxImg && (
                        <div
                            className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in cursor-pointer"
                            onClick={() => setLightboxImg(null)}
                        >
                            <button
                                onClick={(e) => { e.stopPropagation(); setLightboxImg(null); }}
                                className="absolute top-6 right-6 w-10 h-10 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center text-slate-300 hover:text-white hover:bg-slate-700 transition-all duration-300 z-10"
                                aria-label="Fermer"
                            >
                                <Icon name="x" size={22} />
                            </button>
                            <img
                                src={lightboxImg}
                                alt=""
                                className="max-w-[90vw] max-h-[90vh] rounded-2xl shadow-2xl shadow-black/50 border border-slate-700/50 cursor-default"
                                style={{ animation: "fadeInUp 0.3s ease-out" }}
                                onClick={(e) => e.stopPropagation()}
                            />
                        </div>
                    )}
                </div>
            );
        }

        // Mount the app
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
